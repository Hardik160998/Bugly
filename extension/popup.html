<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      width: 360px;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      background: #f9fafb;
    }
    .header {
      background: #2563eb;
      color: white;
      padding: 14px 16px;
      font-weight: 600;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header svg { width: 18px; height: 18px; flex-shrink: 0; }
    .content { padding: 14px 16px; }

    /* Canvas annotation area */
    .canvas-wrapper {
      position: relative;
      width: 100%;
      background: #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 8px;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #annotation-canvas {
      display: none;
      width: 100%;
      cursor: crosshair;
      border-radius: 8px;
    }
    #preview-text {
      font-size: 12px;
      color: #6b7280;
      padding: 32px 0;
    }

    .annotation-hint {
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 12px;
      display: none;
      align-items: center;
      gap: 6px;
    }
    .annotation-hint.visible { display: flex; }
    .hint-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; flex-shrink: 0; }

    .clear-btn {
      background: none;
      border: 1px solid #d1d5db;
      color: #374151;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 5px;
      cursor: pointer;
      width: auto;
      margin-left: auto;
      display: none;
    }
    .clear-btn:hover { background: #f3f4f6; }
    .clear-btn.visible { display: block; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 4px;
    }
    input[type="text"], textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      margin-bottom: 12px;
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: border 0.15s;
    }
    input[type="text"]:focus, textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }

    #submit-btn {
      width: 100%;
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #submit-btn:hover { background: #1d4ed8; }
    #submit-btn:disabled { background: #93c5fd; cursor: not-allowed; }

    .status {
      margin-top: 10px;
      text-align: center;
      font-size: 13px;
      color: #059669;
      display: none;
    }
    .status.error { color: #dc2626; }
  </style>
</head>
<body>
  <div class="header">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m8 2 1.88 1.88"/><path d="M14.12 3.88 16 2"/>
      <path d="M9 7.13v-1a3.003 3.003 0 1 1 6 0v1"/>
      <path d="M12 20c-3.3 0-6-2.7-6-6v-3a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v3c0 3.3-2.7 6-6 6"/>
      <path d="M12 20v-9"/><path d="M6.53 9C4.6 8.8 3 7.1 3 5"/>
      <path d="M6 13H2"/><path d="M3 21c0-2.1 1.7-3.9 3.8-4"/>
      <path d="M20.97 5c-2.1.2-3.67 1.9-3.67 4"/><path d="M22 13h-4"/>
      <path d="M17.2 17c2.1.1 3.8 1.9 3.8 4"/>
    </svg>
    Report Bug
  </div>

  <div class="content">
    <div class="canvas-wrapper">
      <span id="preview-text">Capturing screenshot...</span>
      <canvas id="annotation-canvas"></canvas>
    </div>

    <div style="display:flex; align-items:center; margin-bottom:12px;">
      <div class="annotation-hint" id="annotation-hint">
        <span class="hint-dot"></span>
        <span>Drag on the screenshot to highlight the bug area</span>
      </div>
      <button class="clear-btn" id="clear-btn">✕ Clear</button>
    </div>

    <label>Project ID</label>
    <input type="text" id="project-id" placeholder="Paste your project UUID" />

    <label>Description</label>
    <textarea id="description" rows="3" placeholder="What went wrong on this page?"></textarea>

    <button id="submit-btn" disabled>Submit Report</button>
    <div id="status-msg" class="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
